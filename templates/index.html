<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Web Experience</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background-glows">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div class="app-container">
        <!-- Header & Stats Dashboard -->
        <header>
            <div class="logo">
                <h1>HANGMAN</h1>
                <span class="subtitle">Word Guessing Challenge</span>
            </div>
            <div class="stats-card">
                <div class="stat-item">
                    <span class="stat-value" id="stats-wins">0</span>
                    <span class="stat-label">Wins</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="stats-losses">0</span>
                    <span class="stat-label">Losses</span>
                </div>
            </div>
        </header>

        <!-- Main Game Area -->
        <main class="game-card">
            <!-- Game Details -->
            <div class="game-meta">
                <div class="meta-item">
                    <span class="meta-label">Category</span>
                    <span class="meta-value" id="game-category">—</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Guesses Left</span>
                    <span class="meta-value highlight" id="guesses-remaining">6/6</span>
                </div>
            </div>

            <!-- Hangman Guess Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar" id="game-progress" style="width: 0%;"></div>
            </div>

            <!-- Masked Secret Word Slots -->
            <div class="word-display-container">
                <div class="word-slots" id="word-slots">
                    <!-- Dynamic word slots added via JS -->
                </div>
            </div>

            <!-- Virtual Keyboard -->
            <div class="keyboard-container">
                <div class="keyboard" id="keyboard">
                    <!-- Keys A-Z populated via JS -->
                </div>
            </div>

            <!-- Action Controls -->
            <div class="actions">
                <button class="btn btn-secondary" id="btn-reset-stats">Reset Stats</button>
                <button class="btn btn-primary" id="btn-new-game">New Game</button>
            </div>
        </main>
    </div>

    <!-- Modal Backdrop & Overlays -->
    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal" id="game-modal">
            <div class="modal-icon" id="modal-icon">🎉</div>
            <h2 class="modal-title" id="modal-title">You Won!</h2>
            <p class="modal-message" id="modal-message">Awesome job guessing the word.</p>
            <div class="modal-word-reveal">
                <span class="reveal-label">The word was:</span>
                <span class="reveal-value" id="modal-revealed-word">PYTHON</span>
            </div>
            <button class="btn btn-primary btn-large" id="modal-btn-action">Play Again</button>
        </div>
    </div>

    <!-- Main JavaScript script -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
